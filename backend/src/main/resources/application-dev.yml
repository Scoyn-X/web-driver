# 开发环境配置文件

# Spring Security 配置
security:
  # 免认证路径列表
  permit-paths:
    - /doc.html
    - /swagger-ui.html
    - /swagger-ui/**
    - /v3/api-docs/**
    - /webjars/**
    - /actuator/**
    - /api/v1/auth/**
    - /api/v1/s/**

# 服务器配置
server:
  # 后端服务端口
  port: 8989

# Spring 配置
spring:
  # 底层数据源物理连接配置
  datasource:
    # 数据源连接池类型
    type: com.alibaba.druid.pool.DruidDataSource
    # 数据库驱动类名
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 数据库连接 URL
    url: jdbc:mysql://localhost:3306/youlai_boot?zeroDateTimeBehavior=convertToNull&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&autoReconnect=true&allowMultiQueries=true
    # 数据库用户名
    username: root
    # 数据库密码
    password: 123456
  # 上层数据访问逻辑配置
  data:
    # Redis 配置
    redis:
      # Redis 数据库索引，默认 0
      database: 0
      # Redis 服务器地址
      host: localhost
      # Redis 服务器连接端口
      port: 6379
      # Redis 服务器密码
      # 注意：如果 Redis 服务未设置密码，需要将 password 删掉或注释掉，而不是设置为空字符串
      password: 123456
      # 连接超时时间，默认 10 秒
      timeout: 10s
      # （可选）lettuce 连接池配置（如果不配置则使用 Spring Boot 默认配置）
      lettuce:
        # 连接池配置
        pool:
          # 最大连接数，默认 8，负值表示没有限制
          max-active: 8
          # 最大阻塞等待时间，默认 -1，负值表示没有限制
          max-wait: -1
          # 最大空闲连接，默认 8
          max-idle: 8
          # 最小空闲连接，默认 0
          min-idle: 0
  # 缓存配置
  cache:
    # 是否启用缓存
    enabled: true
    # 缓存类型（redis caffeine）
    type: redis
    # Redis 缓存配置
    redis:
      # 缓存时间（毫秒），默认 1 小时
      time-to-live: 3600000
      # 是否缓存 null 值
      # 建议开启，防止缓存穿透
      cache-null-values: true
    # Caffeine缓存配置
    caffeine:
      # 缓存规格
      spec: initialCapacity=50,maximumSize=1000,expireAfterWrite=600s
  # 请求配置
  servlet:
    # 文件上传配置
    multipart:
      # 单个文件上传大小限制，默认 10MB
      max-file-size: 2048MB
      # 单个请求上传大小限制，默认 2GB
      max-request-size: 2048MB
      # 是否延迟解析文件上传请求
      # 默认为 true，开启后可以在 Controller 中使用 @RequestParam 注解获取文件参数
      resolve-lazily: true

# MyBatis-Plus 配置
mybatis-plus:
  # mapper XML 文件路径
  mapper-locations: classpath*:/mapper/**/*.xml
  # MyBatis-Plus 全局配置
  global-config:
    # sql 注入器配置
    db-config:
      # 主键 ID 类型
      id-type: none
      # 逻辑删除对应的全局属性名
      # 注意：须是对象属性名，不能是表字段名，如 isDeleted 而非 is_deleted，否则逻辑删除失效
      logic-delete-field: isDeleted
      # 逻辑删除-删除值
      logic-delete-value: 1
      # 逻辑删除-未删除值
      logic-not-delete-value: 0
  # MyBatis 配置
  configuration:
    # 驼峰下划线转换
    map-underscore-to-camel-case: true
    # 这个配置会将执行的 sql 打印出来，在开发或测试的时候可以用
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 文件存储配置
oss:
  # OSS 类型（aliyun minio local）
  type: minio
  # MinIO 对象存储服务
  minio:
    # MinIO 服务地址
    endpoint: http://localhost:9000
    # 访问凭据
    access-key: minioadmin
    # 凭据密钥
    secret-key: minioadmin
    # 存储桶名称
    bucket-name: jiayuan-boot
    # （可选）自定义域名：配置后，文件URL会使用该域名格式
    custom-domain:
  # 阿里云 OSS 对象存储服务
  aliyun:
    # 服务 Endpoint
    endpoint: oss-cn-hangzhou.aliyuncs.com
    # 访问凭据`
    access-key-id: your-access-key-id
    # 凭据密钥
    access-key-secret: your-access-key-secret
    # 存储桶名称
    bucket-name: default
  # 本地存储
  local:
    # 文件存储路径
    # 注意：mac 用户请使用 /Users/your-username/your-path/，否则会有权限问题，windows 用户请使用 D:/your-path/
    storage-path:

# springdoc 配置：https://springdoc.org/properties.html
springdoc:
  api-docs:
    # OpenAPI 规范文档的访问路径
    path: /v3/api-docs
  swagger-ui:
    # Swagger UI 的访问路径
    path: /swagger-ui.html
    # 操作排序方式（alpha-按字母排序 method-按方法排序 none-不排序）
    operations-sorter: alpha
    # 标签排序方式（alpha-按字母排序 method-按方法排序 none-不排序）
    tags-sorter: alpha
  # 是否开启 Swagger UI 的默认平铺参数对象
  default-flat-param-object: true
  group-configs:
    # 分组
    - group: "系统接口"
      # 需要匹配的路径
      paths-to-match: "/**"
      # 扫描的包路径
      packages-to-scan:
        - com.jiayuan.boot.system.admin.controller
        - com.jiayuan.boot.system.counter.controller
        - com.jiayuan.boot.system.oss.controller
        - com.jiayuan.boot.system.auth.controller
        - com.jiayuan.boot.system.quota.controller
        - com.jiayuan.boot.system.share.controller
        - com.jiayuan.boot.system.team.controller
        - com.jiayuan.boot.system.user.controller
        - com.jiayuan.boot.system.privatespace.controller

        

# knife4j 接口文档配置
knife4j:
  # 是否开启 Knife4j 增强功能
  enable: true
  # 生产环境配置，设置为 true 表示在生产环境中不显示文档
  # 开发环境下建议设置为 false
  production: false
  setting:
    # 语言（zh_cn-中文 en-英文）
    language: zh_cn

# JWT 配置
jwt:
  # 签名密钥（至少32字符）
  secret: myJwtSecretKey1234567890abcdefghij
  # Token 有效期（毫秒），默认 24 小时
  expiration: 86400000

# Lab3 回收站保留期清理配置，Duration 支持 30s/10m/72h 等秒级验收写法
lab3:
  retention:
    cleanup-interval: 30s
    private-grace-period: 72h
    private-trash-retention: 72h
    cleanup-batch-size: 100
